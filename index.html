<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Seaglassy">

    <style>
        :root {
            --primary: #f5a623;
            --primary-dark: #d48e00;
            --primary-light: #fff9eb;
            --yellow: #ffc800;
            --yellow-dark: #e5a600;
            --bg: #fafaf7;
            --card: #ffffff;
            --text: #1a1a1a;
            --text2: #6b7280;
            --text3: #9ca3af;
            --border: #e5e5e0;
            --green: #22c55e;
            --green-bg: #dcfce7;
            --green-text: #166534;
            --orange: #f59e0b;
            --orange-bg: #fef3c7;
            --orange-text: #92400e;
            --purple: #f5a623;
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: calc(80px + var(--safe-bottom));
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Top bar ─── */
        .top-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(248,250,252,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
        }

        .top-bar-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }

        .brand {
            display: flex; align-items: center; gap: 10px;
        }

        .brand-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #ffc800, #f5a623);
            display: flex; align-items: center; justify-content: center;
            color: white;
        }
        .brand-icon svg { width: 20px; height: 20px; }

        .brand h1 {
            font-size: 1.2rem; font-weight: 700; color: var(--text);
            letter-spacing: -0.3px;
        }

        .top-actions {
            display: flex; gap: 8px; align-items: center;
        }

        .icon-btn {
            width: 40px; height: 40px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--card);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.92); background: var(--bg); }

        .search-bar {
            position: relative;
        }
        .search-bar input {
            width: 100%; padding: 10px 14px 10px 40px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 15px; background: var(--card); outline: none;
            transition: border-color 0.2s; color: var(--text);
        }
        .search-bar input:focus { border-color: var(--yellow); }
        .search-bar input::placeholder { color: var(--text3); }
        .search-bar .search-icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            color: var(--text3); pointer-events: none;
            display: flex; align-items: center;
        }

        /* ─── Filter pills ─── */
        .filters {
            display: flex; gap: 8px; padding: 10px 16px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-pill {
            flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
            border: 1.5px solid var(--border); background: var(--card);
            font-size: 13px; font-weight: 600; color: var(--text2);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .filter-pill:active { transform: scale(0.95); }
        .filter-pill.active {
            background: var(--yellow); color: #1a1a1a; border-color: var(--yellow);
        }

        /* ─── Stats row ─── */
        .stats-row {
            display: flex; gap: 8px; padding: 4px 16px 8px;
        }
        .stat-mini {
            flex: 1; text-align: center; padding: 10px 8px;
            background: var(--card); border-radius: 12px;
            border: 1px solid var(--border);
        }
        .stat-mini .num { font-size: 1.4rem; font-weight: 800; color: var(--yellow-dark); }
        .stat-mini .lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        /* ─── Package cards ─── */
        .cards-container {
            padding: 8px 16px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .pkg-card {
            background: var(--card); border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 14px 16px;
            transition: all 0.2s; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .pkg-card:active { transform: scale(0.985); background: #f8fafc; }

        .pkg-card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }

        .pkg-recipient {
            font-size: 16px; font-weight: 700; color: var(--text);
            line-height: 1.3;
        }

        .pkg-status {
            flex-shrink: 0; padding: 4px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .pkg-status.sent { background: var(--green-bg); color: var(--green-text); }
        .pkg-status.pending { background: var(--orange-bg); color: var(--orange-text); }

        .pkg-tracking-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
        }

        .pkg-carrier {
            padding: 2px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 700;
        }
        .c-spx { background: #fef3c7; color: #92400e; }
        .c-kex { background: #dbeafe; color: #1e40af; }
        .c-jt { background: #fce7f3; color: #9d174d; }

        .pkg-tracking {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px; font-weight: 600; color: #b47d00;
            letter-spacing: 0.5px; cursor: pointer;
            padding: 2px 6px; border-radius: 6px;
            transition: background 0.15s;
        }
        .pkg-tracking:active { background: var(--orange-bg); }

        .pkg-details {
            font-size: 13px; color: var(--text2); line-height: 1.4;
        }
        .pkg-details .detail-row {
            display: flex; align-items: baseline; gap: 6px; margin-top: 3px;
        }
        .pkg-details .detail-icon {
            flex-shrink: 0; width: 14px; height: 14px; margin-top: 1px;
        }

        /* ─── Expanded card actions ─── */
        .pkg-actions {
            display: none;
            flex-wrap: wrap;
            gap: 8px; margin-top: 12px; padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .pkg-card.expanded .pkg-actions { display: flex; }
        .action-btn.action-share { flex: 1 1 100%; }

        .action-btn {
            flex: 1; padding: 10px 8px; border-radius: 10px;
            border: 1.5px solid var(--border); background: var(--card);
            font-size: 12px; font-weight: 600; color: var(--text2);
            cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .action-btn:active { transform: scale(0.95); background: var(--bg); }
        .action-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .action-btn.action-share { background: var(--yellow); border-color: var(--yellow); color: #1a1a1a; font-weight: 700; }
        .action-btn.action-share:active { background: var(--yellow-dark); }
        .action-btn.action-del:active { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

        /* ─── FAB (Floating Action Button) ─── */
        .fab {
            position: fixed;
            bottom: calc(90px + var(--safe-bottom));
            right: 20px;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffc800, #f5a623);
            color: #1a1a1a; border: none;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(245,166,35,0.45);
            cursor: pointer; z-index: 200;
            transition: all 0.2s;
        }
        .fab svg { width: 28px; height: 28px; }
        .fab:active { transform: scale(0.9); }

        /* ─── Bottom nav ─── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around;
            padding: 8px 0;
            padding-bottom: calc(8px + var(--safe-bottom));
            z-index: 150;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; padding: 6px 16px; border: none; background: none;
            cursor: pointer; color: var(--text3); font-size: 10px; font-weight: 600;
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--yellow-dark); }
        .nav-item .nav-icon { display: flex; align-items: center; justify-content: center; height: 24px; }
        .nav-item .nav-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item:active { transform: scale(0.9); }

        /* ─── Modal (fullscreen on mobile) ─── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: flex-end; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }

        .modal-sheet {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 92vh; max-height: 92dvh;
            overflow-y: auto;
            padding: 0 20px 20px;
            padding-bottom: calc(20px + var(--safe-bottom));
            animation: slideUp 0.3s ease;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 36px; height: 5px; border-radius: 3px;
            background: var(--text3); margin: 12px auto 16px;
        }

        .modal-title {
            font-size: 1.3rem; font-weight: 800; margin-bottom: 20px;
            color: var(--text);
        }

        .form-field { margin-bottom: 14px; }
        .form-field label {
            display: block; font-size: 12px; font-weight: 700;
            color: var(--text2); margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-field input, .form-field select, .form-field textarea {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 16px; outline: none;
            transition: border-color 0.2s; background: var(--bg);
            color: var(--text);
            /* prevent zoom on iOS */
            font-size: max(16px, 1em);
        }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
            border-color: var(--yellow); background: var(--card);
        }
        .form-field textarea { resize: vertical; min-height: 70px; }

        .form-row { display: flex; gap: 10px; }
        .form-row .form-field { flex: 1; }

        .btn-primary {
            width: 100%; padding: 14px; border-radius: 14px;
            background: var(--yellow); color: #1a1a1a; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.15s; margin-top: 6px;
        }
        .btn-primary:active { transform: scale(0.98); background: var(--yellow-dark); }

        .btn-secondary {
            width: 100%; padding: 14px; border-radius: 14px;
            background: var(--bg); color: var(--text2); border: 1px solid var(--border);
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; margin-top: 8px;
        }
        .btn-secondary:active { transform: scale(0.98); }

        /* ─── Scan modal ─── */
        .scan-icon { font-size: 3rem; margin-bottom: 8px; }

        .scan-choices { display: flex; gap: 10px; margin-bottom: 16px; }
        .scan-choice {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 6px; padding: 20px 12px; border-radius: 16px;
            border: 1.5px solid var(--border); background: var(--card);
            cursor: pointer; transition: all 0.15s; color: var(--text2);
        }
        .scan-choice:active { transform: scale(0.96); background: var(--primary-light); border-color: var(--yellow); }
        .scan-choice-label { font-size: 14px; font-weight: 700; color: var(--text); }
        .scan-choice-sub { font-size: 11px; color: var(--text3); }

        .scan-preview { margin-top: 12px; display: none; text-align: center; }
        .scan-preview img {
            max-width: 100%; max-height: 180px; border-radius: 12px;
            border: 1px solid var(--border);
        }

        .ocr-loader {
            display: none; margin-top: 16px; text-align: center;
        }
        .ocr-bar-bg {
            width: 100%; height: 6px; background: var(--border); border-radius: 3px;
            overflow: hidden; margin-top: 8px;
        }
        .ocr-bar {
            height: 100%; border-radius: 3px; width: 0%;
            background: linear-gradient(90deg, var(--yellow-dark), var(--yellow));
            transition: width 0.3s;
        }
        .ocr-text { font-size: 13px; color: var(--text2); margin-top: 6px; }

        /* ─── Toast ─── */
        .toast {
            position: fixed; top: calc(20px + env(safe-area-inset-top, 0px));
            left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--text); color: white;
            padding: 12px 24px; border-radius: 14px;
            font-size: 14px; font-weight: 600;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            opacity: 0; transition: all 0.3s; z-index: 3000;
            white-space: nowrap; max-width: 90vw;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text3);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-text { font-size: 15px; line-height: 1.5; }

        .highlight { background: #fef08a; border-radius: 3px; padding: 0 2px; }

        /* ─── Photo thumbnail ─── */
        .pkg-card-body { display: flex; gap: 12px; }
        .pkg-card-info { flex: 1; min-width: 0; }
        .pkg-thumb {
            flex-shrink: 0; width: 56px; height: 56px; border-radius: 10px;
            object-fit: cover; border: 1px solid var(--border); cursor: pointer;
            transition: opacity 0.15s;
        }
        .pkg-thumb:active { opacity: 0.7; }

        /* ─── Lightbox ─── */
        .lightbox {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center;
            padding: 20px; cursor: pointer;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 100%; max-height: 90vh; max-height: 90dvh;
            border-radius: 12px; object-fit: contain;
        }
        .lightbox-close {
            position: absolute; top: 16px; right: 16px;
            top: calc(16px + env(safe-area-inset-top, 0px));
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            color: white; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* ─── iPad / Desktop ─── */
        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .bottom-nav { display: none; }
            .fab { bottom: 30px; right: 30px; width: 64px; height: 64px; }

            .cards-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
                gap: 12px;
                padding: 12px 24px 24px;
                max-width: 1200px; margin: 0 auto;
            }

            .top-bar { padding: 16px 24px; padding-top: calc(16px + env(safe-area-inset-top, 0px)); }
            .filters { padding: 10px 24px; }
            .stats-row { padding: 4px 24px 8px; max-width: 600px; }

            .modal-sheet {
                border-radius: 24px;
                max-width: 480px; margin: auto;
                max-height: 85vh;
            }
            .modal-overlay { justify-content: center; align-items: center; }

            @keyframes slideUp {
                from { transform: translateY(30px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }

        @media (min-width: 1024px) {
            .cards-container { grid-template-columns: repeat(3, 1fr); }
        }
    </style>

</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="top-bar-header">
        <div class="brand">
            <div class="brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16v-2"/><path d="m7.5 4.27 9 5.15"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg></div>
            <h1>Seaglassy</h1>
        </div>
        <div class="top-actions">
            <button class="icon-btn" onclick="openAddModal()" title="เพิ่มพัสดุ"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="icon-btn" onclick="exportCSV()" title="ส่งออก"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
    </div>
    <div class="search-bar">
        <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ เลขพัสดุ ที่อยู่ เบอร์โทร...">
    </div>
</div>

<!-- Filters -->
<div class="filters">
    <button class="filter-pill active" data-filter="all">ทั้งหมด</button>
    <button class="filter-pill" data-filter="sent">ส่งแล้ว</button>
    <button class="filter-pill" data-filter="pending">รอส่ง</button>
    <button class="filter-pill" data-filter="SPX">SPX</button>
    <button class="filter-pill" data-filter="KEX">KEX</button>
    <button class="filter-pill" data-filter="J&T">J&T</button>
</div>

<!-- Stats -->
<div class="stats-row">
    <div class="stat-mini"><div class="num" id="totalCount">0</div><div class="lbl">ทั้งหมด</div></div>
    <div class="stat-mini"><div class="num" id="sentCount">0</div><div class="lbl">ส่งแล้ว</div></div>
    <div class="stat-mini"><div class="num" id="pendingCount">0</div><div class="lbl">รอส่ง</div></div>
</div>

<!-- Package cards -->
<div class="cards-container" id="cardsContainer"></div>

<!-- FAB: camera -->
<button class="fab" onclick="openScanModal()" title="สแกนรูปพัสดุ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>

<!-- Bottom nav (mobile) -->
<div class="bottom-nav">
    <button class="nav-item active" data-filter="all" onclick="navFilter(this, 'all')">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16v-2"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg></span>ทั้งหมด
    </button>
    <button class="nav-item" data-filter="sent" onclick="navFilter(this, 'sent')">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>ส่งแล้ว
    </button>
    <button class="nav-item" data-filter="pending" onclick="navFilter(this, 'pending')">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>รอส่ง
    </button>
</div>

<!-- Scan Modal -->
<div class="modal-overlay" id="scanModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>

// ─── Data ───
function loadPackages() {
    const s = localStorage.getItem('seaglassy_packages_v2');
    if (s) {
        const stored = JSON.parse(s);
        // Merge photo field from initialData into stored entries that are missing it
        const photoMap = {};
        initialData.forEach(d => { if (d.photo) photoMap[d.id] = d.photo; });
        let updated = false;
        stored.forEach(p => {
            if (!p.photo && photoMap[p.id]) { p.photo = photoMap[p.id]; updated = true; }
        });
        if (updated) localStorage.setItem('seaglassy_packages_v2', JSON.stringify(stored));
        return stored;
    }
    localStorage.setItem('seaglassy_packages_v2', JSON.stringify(initialData));
    return [...initialData];
}
function saveData(p) { localStorage.setItem('seaglassy_packages_v2', JSON.stringify(p)); }

let packages = loadPackages();
let currentFilter = 'all';
let currentSearch = '';
let expandedId = null;

// ─── Render cards ───
function render() {
    const container = document.getElementById('cardsContainer');
    let list = packages.filter(p => {
        if (currentFilter === 'sent' && p.status !== 'sent') return false;
        if (currentFilter === 'pending' && p.status !== 'pending') return false;
        if (['SPX','KEX','J&T'].includes(currentFilter) && p.carrier !== currentFilter) return false;
        if (currentSearch) {
            const s = currentSearch.toLowerCase();
            return ['name','tracking','address','phone','notes'].some(k => (p[k]||'').toLowerCase().includes(s));
        }
        return true;
    });

    list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    // Stats
    document.getElementById('totalCount').textContent = packages.length;
    document.getElementById('sentCount').textContent = packages.filter(p => p.status === 'sent').length;
    document.getElementById('pendingCount').textContent = packages.filter(p => p.status === 'pending').length;

                ${p.phone ? `<button class="action-btn" onclick="callPhone(event,'${p.phone}')"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/></svg>โทร</button>` : ''}
                <button class="action-btn" onclick="editPkg(event,${p.id})"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>แก้ไข</button>
                <button class="action-btn action-del" onclick="delPkg(event,${p.id})"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>ลบ</button>
            </div>
        </div>`;
    }).join('');
}

function truncAddr(a) { return a.length > 80 ? a.substring(0, 80) + '…' : a; }
function esc(s) { return s.replace(/'/g, "\\'"); }

function hl(text) {
    if (!currentSearch || !text) return text;
    const e = currentSearch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${e})`, 'gi'), '<span class="highlight">$1</span>');
}

function toggleCard(id, e) {
    if (e.target.closest('.action-btn') || e.target.closest('.pkg-thumb')) return;
    expandedId = expandedId === id ? null : id;
    render();
}

function openLightbox(e, src) {
    e.stopPropagation();
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
}

function copyTrkLink(e, id) {
    e.stopPropagation();
    const p = packages.find(x => x.id === id);
    if (!p) return;
    const c = p.carrier === 'J&T' ? 'JT' : p.carrier;
    const url = `${TRACK_BASE}?t=${encodeURIComponent(p.tracking)}&c=${encodeURIComponent(c)}&n=${encodeURIComponent((p.name||'').split(' ')[0])}`;
    navigator.clipboard.writeText(url).then(() => showToast('คัดลอกลิงก์แล้ว วางใน chat ได้เลย ✓'));
}

function trackPkg(e, tracking) {
    e.stopPropagation();
    window.open(`https://parcelsapp.com/en/tracking/${encodeURIComponent(tracking)}`, '_blank');
}

function copyTrk(e, tracking) {
    e.stopPropagation();
    navigator.clipboard.writeText(tracking).then(() => showToast('คัดลอกเลขพัสดุแล้ว ✓'));
}

function callPhone(e, phone) {
    e.stopPropagation();
    window.location.href = 'tel:' + phone;
}

// ─── Add / Edit ───
function openAddModal(keepPhoto) {
    if (!keepPhoto) pendingPhoto = '';
    document.getElementById('formTitle').textContent = 'เพิ่มพัสดุใหม่';
    document.getElementById('editId').value = '';
    document.getElementById('formDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('formCarrier').value = 'KEX';
    document.getElementById('formTracking').value = '';
    document.getElementById('formName').value = '';
    document.getElementById('formPhone').value = '';
    document.getElementById('formAddress').value = '';
    document.getElementById('formStatus').value = 'pending';
    document.getElementById('formNotes').value = '';
    document.getElementById('formModal').classList.add('active');
}

function editPkg(e, id) {
    e.stopPropagation();
    const p = packages.find(x => x.id === id);
    if (!p) return;
    document.getElementById('formTitle').textContent = 'แก้ไขพัสดุ';
    document.getElementById('editId').value = p.id;
    document.getElementById('formDate').value = p.date || '';
    document.getElementById('formCarrier').value = p.carrier || 'KEX';
    document.getElementById('formTracking').value = p.tracking || '';
    document.getElementById('formName').value = p.name || '';
    document.getElementById('formPhone').value = p.phone || '';
    document.getElementById('formAddress').value = p.address || '';
    document.getElementById('formStatus').value = p.status || 'sent';
    document.getElementById('formNotes').value = p.notes || '';
    document.getElementById('formModal').classList.add('active');
}

function closeFormModal() { document.getElementById('formModal').classList.remove('active'); }

function savePackage() {
    const eid = document.getElementById('editId').value;
    const pkg = {
        date: document.getElementById('formDate').value,
        carrier: document.getElementById('formCarrier').value,
        tracking: document.getElementById('formTracking').value,
        name: document.getElementById('formName').value,
        phone: document.getElementById('formPhone').value,
        address: document.getElementById('formAddress').value,
        status: document.getElementById('formStatus').value,
        notes: document.getElementById('formNotes').value,
    };
    if (!pkg.name && !pkg.tracking) { showToast('กรุณากรอกชื่อหรือเลขพัสดุ'); return; }

    if (eid) {
        const i = packages.findIndex(p => p.id == eid);
        if (i !== -1) {
            if (pendingPhoto) packages[i].photo = pendingPhoto;
            packages[i] = { ...packages[i], ...pkg, photo: pendingPhoto || packages[i].photo };
        }
        showToast('แก้ไขเรียบร้อย ✓');
    } else {
        pkg.id = Date.now();
        if (pendingPhoto) pkg.photo = pendingPhoto;
        packages.unshift(pkg);
        showToast('เพิ่มพัสดุเรียบร้อย ✓');
    }
    pendingPhoto = '';
    saveData(packages); closeFormModal(); render();
}

function delPkg(e, id) {
    e.stopPropagation();
    if (!confirm('ลบพัสดุนี้?')) return;
    packages = packages.filter(p => p.id !== id);
    saveData(packages); render();
    showToast('ลบแล้ว ✓');
}

// ─── Scan ───
function openScanModal() {
    document.getElementById('scanModal').classList.add('active');
    document.getElementById('scanPreview').style.display = 'none';
    document.getElementById('ocrLoader').style.display = 'none';
    document.getElementById('photoCam').value = '';
    document.getElementById('photoLib').value = '';
}
function closeScanModal() { document.getElementById('scanModal').classList.remove('active'); }

async function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;

    // Read image as data URL for preview + save as thumbnail
    const dataUrl = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = ev => resolve(ev.target.result);
        reader.readAsDataURL(file);
    });

    // Resize to thumbnail to save localStorage space
    const thumb = await new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const c = document.createElement('canvas');
            const max = 200;
            const scale = Math.min(max / img.width, max / img.height, 1);
            c.width = img.width * scale;
            c.height = img.height * scale;
            c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
            resolve(c.toDataURL('image/jpeg', 0.7));
        };
        img.src = dataUrl;
    });
    pendingPhoto = thumb;

    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('scanPreview').style.display = 'block';

    document.getElementById('ocrLoader').style.display = 'block';
    document.getElementById('ocrText').textContent = 'กำลังเตรียมอ่าน...';
    document.getElementById('ocrBar').style.width = '10%';

    try {
        // Convert image to base64 for Google Cloud Vision
        const base64 = await new Promise((resolve) => {
            const r2 = new FileReader();
            r2.onload = () => resolve(r2.result.split(',')[1]);
            r2.readAsDataURL(file);
        });

        document.getElementById('ocrBar').style.width = '50%';
        document.getElementById('ocrText').textContent = 'กำลังอ่าน...';

        const resp = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                requests: [{
                    image: { content: base64 },
                    features: [{ type: 'TEXT_DETECTION' }],
                    imageContext: { languageHints: ['th', 'en'] }
                }]
            })
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error.message);

        const ocrText = data.responses?.[0]?.fullTextAnnotation?.text || '';
        document.getElementById('ocrBar').style.width = '100%';
        document.getElementById('ocrText').textContent = 'เสร็จแล้ว!';

        const extracted = parseLabel(ocrText);
        setTimeout(() => {
            closeScanModal();
            openAddModal(true);
            if (extracted.tracking) document.getElementById('formTracking').value = extracted.tracking;
            if (extracted.name) document.getElementById('formName').value = extracted.name;
            if (extracted.phone) document.getElementById('formPhone').value = extracted.phone;
            if (extracted.address) document.getElementById('formAddress').value = extracted.address;
            if (extracted.carrier) document.getElementById('formCarrier').value = extracted.carrier;
            document.getElementById('formStatus').value = 'sent';
            showToast('ดึงข้อมูลจากรูปแล้ว - ตรวจสอบก่อนบันทึก');
        }, 400);
    } catch (err) {
        console.error(err);
        document.getElementById('ocrText').textContent = 'เกิดข้อผิดพลาด ลองใหม่';
        document.getElementById('ocrBar').style.width = '0%';
    }
}

document.getElementById('photoCam').addEventListener('change', handlePhoto);
document.getElementById('photoLib').addEventListener('change', handlePhoto);

function parseLabel(text) {
    const r = { tracking:'', name:'', phone:'', address:'', carrier:'' };
    console.log('OCR raw text:', text);
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const full = lines.join(' ');

    // ─── Carrier ───
    if (/KEX/i.test(full)) r.carrier = 'KEX';
    else if (/SPX/i.test(full)) r.carrier = 'SPX';
    else if (/J\s*[&]\s*T/i.test(full)) r.carrier = 'J&T';

    // ─── Tracking ───
    const kex = full.match(/TREE\d{9,}/i);
    if (kex) { r.tracking = kex[0]; r.carrier = r.carrier || 'KEX'; }
    const spx = full.match(/TH\d{2}[A-Z0-9]{8,}/i);
    if (spx) { r.tracking = spx[0]; r.carrier = r.carrier || 'SPX'; }
    const jt = full.match(/86\d{10,}/);
    if (jt) { r.tracking = jt[0]; r.carrier = r.carrier || 'J&T'; }
    if (!r.tracking) { const g = full.match(/[A-Z]{2,4}\d{9,}/i); if (g) r.tracking = g[0]; }

    // ─── Phone (exclude sender 0813721504) ───
    const phones = full.match(/0[1-9]\d[\s-]?\d{3,4}[\s-]?\d{4}/g);
    if (phones) {
        r.phone = (phones.find(p => p.replace(/[\s-]/g,'') !== '0813721504') || '').replace(/[\s-]/g,'');
    }

    // ─── Find carrier label section: prefer (TO), then last ผู้รับ ───
    // The handwritten label also has ผู้รับ, so prioritize (TO) marker from carrier
    let toIdx = -1;
    // First: look for line with (TO)
    for (let i = 0; i < lines.length; i++) {
        if (/\(TO\)/.test(lines[i])) { toIdx = i; break; }
    }
    // Fallback: use last ผู้รับ (carrier label comes after handwritten one)
    if (toIdx < 0) {
        for (let i = lines.length - 1; i >= 0; i--) {
            if (/ผู้รับ/.test(lines[i])) { toIdx = i; break; }
        }
    }
    // Find end: next (FROM)/ผู้ส่ง AFTER toIdx, or line with Thai postal code (5 digits not inside longer number)
    let endIdx = lines.length;
    for (let i = toIdx + 1; i < lines.length; i++) {
        if (/\(FROM\)|ผู้ส่ง/.test(lines[i])) { endIdx = i; break; }
        if (/(?<!\d)\d{5}(?!\d)/.test(lines[i])) { endIdx = i + 1; break; } // postal code = exactly 5 digits
    }
    let recipientLines = toIdx >= 0 ? lines.slice(toIdx, endIdx) : [];
    const recipientText = recipientLines.join(' ');

    // Helper: clean junk from a line
    const cleanField = (s) => s
        .replace(/TH\d{2}[A-Z0-9]{8,}/gi, '')
        .replace(/TREE\d{9,}/gi, '')
        .replace(/86\d{10,}/g, '')
        .replace(/0[1-9]\d[\s-]?\d{3,4}[\s-]?\d{4}/g, '')
        .replace(/\[.*?\]/g, '')
        .replace(/\(.*?\)/g, '')
        .replace(/DROP\s*OFF/gi, '')
        .replace(/NO\s*COD/gi, '')
        .replace(/SPX|KEX|J\s*&\s*T|INATA|EXPRESS|AEGA/gi, '')
        .replace(/YO\s*\d+.*/gi, '')
        .replace(/[A-Z]\d{2,}-?/g, '')
        .replace(/HOU\.\d+/gi, '')
        .replace(/HBSUE|NOTE|DOOC|APTUM/gi, '')
        .replace(/\s+/g, ' ')
        .trim();

    // ─── Name: ONLY from carrier label (TO/ผู้รับ section) ───
    if (recipientLines.length) {
        const kunMatch = recipientText.match(/คุณ\s*([\u0E00-\u0E7F]+(?:\s+[\u0E00-\u0E7F]+)*)/);
        const khunMatch = recipientText.match(/Khun\s+([A-Za-z]+(?:\s+[A-Za-z]+)*)/i);
        const nameFromRecipient = recipientLines[0].match(/(?:\(TO\)|ผู้รับ)\s*(?:คุณ\s*)?([\u0E00-\u0E7F]+(?:\s+[\u0E00-\u0E7F]+)*)/);
        r.name = (kunMatch?.[1] || khunMatch?.[1] || nameFromRecipient?.[1] || '').trim().substring(0, 50);
    }

    // ─── Address: ONLY from carrier label, keep only Thai address content ───
    if (recipientLines.length > 1) {
        const addrLines = [];
        for (let i = 1; i < recipientLines.length; i++) {
            const clean = cleanField(recipientLines[i]);
            // Keep only lines with Thai chars or address-like numbers (xx/xxx)
            if (clean && (/[\u0E00-\u0E7F]/.test(clean) || /\d+\/\d+/.test(clean))) {
                addrLines.push(clean);
            }
        }
        if (addrLines.length) r.address = addrLines.join(' ');
    }

    return r;
}

// ─── Export CSV ───
function exportCSV() {
    const h = ['วันที่','ขนส่ง','เลขพัสดุ','ผู้รับ','เบอร์โทร','ที่อยู่','สถานะ','หมายเหตุ'];
    const rows = packages.map(p => [p.date, p.carrier, p.tracking, p.name, p.phone, `"${(p.address||'').replace(/"/g,'""')}"`, p.status==='sent'?'ส่งแล้ว':'รอส่ง', p.notes||'']);
    const csv = '\uFEFF' + h.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
    a.download = `seaglassy_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('ส่งออก CSV แล้ว ✓');
}

// ─── Toast ───
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Filter events ───
function navFilter(btn, f) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = f;
    // sync filter pills
    document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.filter === f);
    });
    render();
}

document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentFilter = pill.dataset.filter;
        // sync bottom nav
        document.querySelectorAll('.nav-item[data-filter]').forEach(n => {
            n.classList.toggle('active', n.dataset.filter === currentFilter);
        });
        render();
    });
});

document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value; render();
});

// Close modals on overlay tap
document.getElementById('formModal').addEventListener('click', e => { if (e.target.id === 'formModal') closeFormModal(); });
document.getElementById('scanModal').addEventListener('click', e => { if (e.target.id === 'scanModal') closeScanModal(); });

// Drag and drop (iPad)
document.getElementById('scanModal').addEventListener('dragover', e => { e.preventDefault(); });
document.getElementById('scanModal').addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file?.type.startsWith('image/')) {
        const dt = new DataTransfer(); dt.items.add(file);
        document.getElementById('photoLib').files = dt.files;
        document.getElementById('photoLib').dispatchEvent(new Event('change'));
    }
});

// Init
render();
</script>
